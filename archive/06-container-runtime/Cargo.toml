[package]
name = "docklet"
version = "0.1.0"
edition = "2021"
description = "A minimal container runtime (Docker-lite)"

[dependencies]
libc = "0.2"
nix = { version = "0.27", features = ["user", "mount", "sched", "fs", "hostname", "signal", "process", "net"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
uuid = { version = "1.0", features = ["v4"] }
sha2 = "0.10"
hex = "0.4"
tar = "0.4"
flate2 = "1.0"
walkdir = "2.4"
clap = { version = "4.0", features = ["derive"] }
log = "0.4"
env_logger = "0.10"
chrono = { version = "0.4", features = ["serde"] }
reqwest = { version = "0.11", features = ["json", "blocking"] }
base64 = "0.21"
rand = "0.8"
ipnetwork = "0.20"

[dev-dependencies]
tempfile = "3.0"

[lib]
name = "docklet"
path = "src/lib.rs"

[[bin]]
name = "docklet"
path = "src/main.rs"

[profile.release]
lto = true
codegen-units = 1
