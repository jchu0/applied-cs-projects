[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "paramserver"
version = "0.1.0"
description = "Large-scale parameter server for distributed ML training"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.9"
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
]
dependencies = [
    "numpy>=1.24.0",
    "pydantic>=2.5.0",
    "python-dotenv>=1.0.0",
    "tenacity>=8.2.0",
    "msgpack>=1.0.0",
]

[project.optional-dependencies]
ml = [
    "torch>=2.1.0",
]
distributed = [
    "horovod>=0.28.0",
    "deepspeed>=0.12.0",
    "mpi4py>=3.1.0",
]
networking = [
    "pyzmq>=25.1.0",
    "grpcio>=1.60.0",
    "grpcio-tools>=1.60.0",
    "aiohttp>=3.9.0",
    "httpx>=0.25.0",
    "protobuf>=4.25.0",
]
storage = [
    "redis>=5.0.0",
    "etcd3>=0.12.0",
    "rocksdict>=0.3.0",
]
database = [
    "sqlalchemy>=2.0.0",
    "aiosqlite>=0.19.0",
    "asyncpg>=0.29.0",
]
compression = [
    "blosc2>=2.4.0",
    "zstandard>=0.22.0",
]
observability = [
    "prometheus-client>=0.19.0",
    "py3nvml>=0.2.7",
    "structlog>=23.2.0",
]
coordination = [
    "kazoo>=2.9.0",
]
dev = [
    "pytest>=7.4.0",
    "pytest-asyncio>=0.21.0",
    "pytest-cov>=4.1.0",
    "black>=23.0.0",
    "ruff>=0.1.0",
    "mypy>=1.7.0",
]
full = [
    "paramserver[ml,distributed,networking,storage,database,compression,observability,coordination,dev]",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.black]
line-length = 100
target-version = ["py39", "py310", "py311"]

[tool.ruff]
line-length = 100
target-version = "py39"
