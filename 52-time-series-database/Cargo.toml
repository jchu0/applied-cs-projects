[package]
name = "time-series-database"
version = "0.1.0"
edition = "2021"
authors = ["Portfolio Project"]
description = "A high-performance time-series database with compression and query capabilities"
license = "MIT"

[dependencies]
thiserror = "1.0"
parking_lot = "0.12"
crossbeam-channel = "0.5"
crc32fast = "1.3"
byteorder = "1.5"
memmap2 = "0.9"
dashmap = "5.5"
hashbrown = "0.14"
fnv = "1.0"
rand = "0.8"
regex = "1.10"

[dev-dependencies]
tempfile = "3.8"
criterion = "0.5"

[[bench]]
name = "benchmarks"
harness = false

[profile.release]
lto = true
codegen-units = 1
opt-level = 3

[profile.bench]
lto = true
codegen-units = 1
