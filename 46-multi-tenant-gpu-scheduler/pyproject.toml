[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "gpusched"
version = "0.1.0"
description = "Multi-tenant GPU scheduler with allocation modes, multi-tenancy, and preemption"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.9"
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
]
dependencies = [
    "numpy>=1.24.0",
    "pydantic>=2.5.0",
]

[project.optional-dependencies]
# NOTE: the `gpu` and `observability` extras are scaffolding for a future
# live-collection backend. They are NOT imported anywhere in the library today
# — the scheduler simulates GPU telemetry (see "What's Real vs Simulated" in the
# README). Installing them does not change the metrics the library produces.
gpu = [
    "pynvml>=11.5.0",
    "gputil>=1.4.0",
]
observability = [
    "prometheus-client>=0.19.0",
]
dev = [
    "pytest>=7.4.0",
    "pytest-cov>=4.1.0",
    "black>=23.0.0",
    "ruff>=0.1.0",
    "mypy>=1.7.0",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.black]
line-length = 100
target-version = ["py39", "py310", "py311"]

[tool.ruff]
line-length = 100
target-version = "py39"
