apiVersion: v2
name: microservice-platform
description: A Helm chart for the Microservice Platform

type: application
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  - name: postgresql
    version: "13.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: "18.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  - name: nats
    version: "8.x.x"
    repository: https://nats-io.github.io/k8s/helm/charts/
    condition: nats.enabled

maintainers:
  - name: ML AI Platform Team
    email: platform@example.com

keywords:
  - microservices
  - api-gateway
  - authentication
  - billing
