syntax = "proto3";

package billing.v1;

option go_package = "github.com/mlai/microservice-platform/pkg/pb/billing/v1;billingv1";

import "google/protobuf/timestamp.proto";
import "common/v1/common.proto";

// BillingService provides billing and subscription management
service BillingService {
  // CreateCustomer creates a billing customer
  rpc CreateCustomer(CreateCustomerRequest) returns (CreateCustomerResponse);

  // GetCustomer retrieves customer billing info
  rpc GetCustomer(GetCustomerRequest) returns (GetCustomerResponse);

  // CreateSubscription creates a new subscription
  rpc CreateSubscription(CreateSubscriptionRequest) returns (CreateSubscriptionResponse);

  // GetSubscription retrieves subscription details
  rpc GetSubscription(GetSubscriptionRequest) returns (GetSubscriptionResponse);

  // UpdateSubscription changes subscription plan
  rpc UpdateSubscription(UpdateSubscriptionRequest) returns (UpdateSubscriptionResponse);

  // CancelSubscription cancels a subscription
  rpc CancelSubscription(CancelSubscriptionRequest) returns (CancelSubscriptionResponse);

  // ListSubscriptions lists all subscriptions for a customer
  rpc ListSubscriptions(ListSubscriptionsRequest) returns (ListSubscriptionsResponse);

  // CreatePaymentMethod adds a payment method
  rpc CreatePaymentMethod(CreatePaymentMethodRequest) returns (CreatePaymentMethodResponse);

  // ListPaymentMethods lists customer payment methods
  rpc ListPaymentMethods(ListPaymentMethodsRequest) returns (ListPaymentMethodsResponse);

  // DeletePaymentMethod removes a payment method
  rpc DeletePaymentMethod(DeletePaymentMethodRequest) returns (DeletePaymentMethodResponse);

  // ListInvoices lists customer invoices
  rpc ListInvoices(ListInvoicesRequest) returns (ListInvoicesResponse);

  // GetInvoice retrieves invoice details
  rpc GetInvoice(GetInvoiceRequest) returns (GetInvoiceResponse);

  // RecordUsage records usage for metered billing
  rpc RecordUsage(RecordUsageRequest) returns (RecordUsageResponse);
}

// Customer represents a billing customer
message Customer {
  string id = 1;
  string tenant_id = 2;
  string stripe_customer_id = 3;
  string email = 4;
  string name = 5;
  string phone = 6;
  Address address = 7;
  map<string, string> metadata = 8;
  google.protobuf.Timestamp created_at = 9;
}

// Address for billing
message Address {
  string line1 = 1;
  string line2 = 2;
  string city = 3;
  string state = 4;
  string postal_code = 5;
  string country = 6;
}

// Subscription represents a billing subscription
message Subscription {
  string id = 1;
  string tenant_id = 2;
  string customer_id = 3;
  string stripe_subscription_id = 4;
  SubscriptionStatus status = 5;
  string price_id = 6;
  string plan_name = 7;
  int64 quantity = 8;
  google.protobuf.Timestamp current_period_start = 9;
  google.protobuf.Timestamp current_period_end = 10;
  google.protobuf.Timestamp cancel_at = 11;
  bool cancel_at_period_end = 12;
  google.protobuf.Timestamp created_at = 13;
}

// SubscriptionStatus
enum SubscriptionStatus {
  SUBSCRIPTION_STATUS_UNSPECIFIED = 0;
  SUBSCRIPTION_STATUS_ACTIVE = 1;
  SUBSCRIPTION_STATUS_PAST_DUE = 2;
  SUBSCRIPTION_STATUS_UNPAID = 3;
  SUBSCRIPTION_STATUS_CANCELED = 4;
  SUBSCRIPTION_STATUS_INCOMPLETE = 5;
  SUBSCRIPTION_STATUS_TRIALING = 6;
}

// PaymentMethod represents a payment method
message PaymentMethod {
  string id = 1;
  string stripe_payment_method_id = 2;
  string type = 3;  // "card", "bank_account"
  CardDetails card = 4;
  bool is_default = 5;
  google.protobuf.Timestamp created_at = 6;
}

// CardDetails for card payment methods
message CardDetails {
  string brand = 1;       // "visa", "mastercard", etc.
  string last4 = 2;
  int32 exp_month = 3;
  int32 exp_year = 4;
}

// Invoice represents a billing invoice
message Invoice {
  string id = 1;
  string stripe_invoice_id = 2;
  string customer_id = 3;
  string subscription_id = 4;
  InvoiceStatus status = 5;
  int64 amount_due = 6;       // in cents
  int64 amount_paid = 7;
  int64 amount_remaining = 8;
  string currency = 9;
  string invoice_pdf = 10;
  string hosted_invoice_url = 11;
  google.protobuf.Timestamp period_start = 12;
  google.protobuf.Timestamp period_end = 13;
  google.protobuf.Timestamp due_date = 14;
  google.protobuf.Timestamp created_at = 15;
}

// InvoiceStatus
enum InvoiceStatus {
  INVOICE_STATUS_UNSPECIFIED = 0;
  INVOICE_STATUS_DRAFT = 1;
  INVOICE_STATUS_OPEN = 2;
  INVOICE_STATUS_PAID = 3;
  INVOICE_STATUS_UNCOLLECTIBLE = 4;
  INVOICE_STATUS_VOID = 5;
}

// Request/Response messages

message CreateCustomerRequest {
  string tenant_id = 1;
  string user_id = 2;
  string email = 3;
  string name = 4;
  string phone = 5;
  Address address = 6;
  map<string, string> metadata = 7;
}

message CreateCustomerResponse {
  Customer customer = 1;
}

message GetCustomerRequest {
  string tenant_id = 1;
  string customer_id = 2;
}

message GetCustomerResponse {
  Customer customer = 1;
}

message CreateSubscriptionRequest {
  string tenant_id = 1;
  string customer_id = 2;
  string price_id = 3;
  int64 quantity = 4;
  string payment_method_id = 5;
  map<string, string> metadata = 6;
}

message CreateSubscriptionResponse {
  Subscription subscription = 1;
  string client_secret = 2;  // For confirming payment if needed
}

message GetSubscriptionRequest {
  string tenant_id = 1;
  string subscription_id = 2;
}

message GetSubscriptionResponse {
  Subscription subscription = 1;
}

message UpdateSubscriptionRequest {
  string tenant_id = 1;
  string subscription_id = 2;
  string price_id = 3;           // New price/plan
  int64 quantity = 4;
  bool prorate = 5;
}

message UpdateSubscriptionResponse {
  Subscription subscription = 1;
}

message CancelSubscriptionRequest {
  string tenant_id = 1;
  string subscription_id = 2;
  bool cancel_at_period_end = 3;
  string reason = 4;
}

message CancelSubscriptionResponse {
  Subscription subscription = 1;
}

message ListSubscriptionsRequest {
  string tenant_id = 1;
  string customer_id = 2;
  common.v1.PaginationRequest pagination = 3;
  SubscriptionStatus status_filter = 4;
}

message ListSubscriptionsResponse {
  repeated Subscription subscriptions = 1;
  common.v1.PaginationResponse pagination = 2;
}

message CreatePaymentMethodRequest {
  string tenant_id = 1;
  string customer_id = 2;
  string payment_method_id = 3;  // Stripe PaymentMethod ID from client
  bool set_as_default = 4;
}

message CreatePaymentMethodResponse {
  PaymentMethod payment_method = 1;
}

message ListPaymentMethodsRequest {
  string tenant_id = 1;
  string customer_id = 2;
}

message ListPaymentMethodsResponse {
  repeated PaymentMethod payment_methods = 1;
}

message DeletePaymentMethodRequest {
  string tenant_id = 1;
  string payment_method_id = 2;
}

message DeletePaymentMethodResponse {
  bool success = 1;
}

message ListInvoicesRequest {
  string tenant_id = 1;
  string customer_id = 2;
  common.v1.PaginationRequest pagination = 3;
  InvoiceStatus status_filter = 4;
}

message ListInvoicesResponse {
  repeated Invoice invoices = 1;
  common.v1.PaginationResponse pagination = 2;
}

message GetInvoiceRequest {
  string tenant_id = 1;
  string invoice_id = 2;
}

message GetInvoiceResponse {
  Invoice invoice = 1;
}

message RecordUsageRequest {
  string tenant_id = 1;
  string subscription_id = 2;
  int64 quantity = 3;
  google.protobuf.Timestamp timestamp = 4;
  string idempotency_key = 5;
}

message RecordUsageResponse {
  bool success = 1;
}
