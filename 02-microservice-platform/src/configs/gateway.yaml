service:
  name: api-gateway
  environment: development
  http_port: 8080
  log_level: debug
  timeout: 30s

services:
  user_service: localhost:9090
  auth_service: localhost:9091
  billing_service: localhost:9092
  notification_service: localhost:9093

redis:
  host: localhost
  port: 6379
  password: ""
  db: 2

jwt:
  public_key_path: ""  # Leave empty to disable JWT validation
  issuer: microservice-platform
  audience: microservice-platform
  public_routes:
    - /api/v1/auth/login
    - /api/v1/auth/register
    - /api/v1/auth/refresh
    - /api/v1/health
    - /health

rate_limit:
  enabled: true
  requests_per_min: 100
  burst_size: 20
  window_duration: 1m

cors:
  allowed_origins:
    - "*"
  allowed_methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
    - PATCH
  allowed_headers:
    - Authorization
    - Content-Type
    - X-Request-ID
    - X-Tenant-ID
  exposed_headers:
    - X-Request-ID
    - X-RateLimit-Remaining
    - X-RateLimit-Limit
    - X-RateLimit-Reset
  allow_credentials: true
  max_age: 86400

tracing:
  enabled: true
  jaeger_url: http://localhost:14268/api/traces
  sampling_rate: 1.0

metrics:
  enabled: true
  port: 8080
  path: /metrics
