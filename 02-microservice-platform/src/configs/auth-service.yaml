service:
  name: auth-service
  environment: development
  grpc_port: 9091
  http_port: 8091
  log_level: debug
  timeout: 30s

redis:
  host: localhost
  port: 6379
  password: ""
  db: 1

jwt:
  private_key_path: ""  # Leave empty to generate keys
  public_key_path: ""
  issuer: microservice-platform
  audience: microservice-platform
  access_token_ttl: 15m
  refresh_token_ttl: 168h  # 7 days

nats:
  url: nats://localhost:4222
  cluster_id: microservice-cluster
  client_id: auth-service

tracing:
  enabled: true
  jaeger_url: http://localhost:14268/api/traces
  sampling_rate: 1.0

metrics:
  enabled: true
  port: 8091
  path: /metrics

# Service endpoints
user_service_addr: localhost:9090
